<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | 我的網站</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="text-center space-y-6">
        <h1 class="text-5xl font-bold text-gray-800">{{ message }}</h1>
        <p class="text-lg text-gray-500">FastAPI + SQLite + Tailwind CSS</p>
        <div class="flex justify-center gap-3">
            <span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm font-medium">FastAPI</span>
            <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-sm font-medium">SQLite</span>
            <span class="px-3 py-1 bg-cyan-100 text-cyan-700 rounded-full text-sm font-medium">Tailwind CSS</span>
            <span class="px-3 py-1 bg-purple-100 text-purple-700 rounded-full text-sm font-medium">Jinja2</span>
        </div>
        <p class="text-sm text-gray-400 pt-4">準備部署到 Railway</p>
    </div>
</body>
</html>
